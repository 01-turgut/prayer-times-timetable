<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Prayer Times</title>
    <style>
        /* Add some basic styling for the clock and countdown */
        .clock {
            font-size: 2em;
            margin: 20px;
        }
        .countdown {
            font-size: 1.5em;
            margin: 20px;
        }
        .prayer-times-table {
            margin: 20px;
            border-collapse: collapse;
            width: 100%;
        }
        .prayer-times-table th, .prayer-times-table td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="clock" id="liveClock"></div>
    <div class="countdown" id="countdownTimer"></div>
    <table class="prayer-times-table" id="prayerTimes">
        <thead>
            <tr>
                <th>Prayer</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody>
            <!-- Dynamic content will be inserted here -->
        </tbody>
    </table>
    <script>
        // Function to update the live clock
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toUTCString();
        }

        // Function to set up a countdown timer
        function setupCountdown(targetDate) {
            const countdown = setInterval(() => {
                const now = new Date();
                const timeRemaining = targetDate - now;
                if (timeRemaining <= 0) {
                    clearInterval(countdown);
                    document.getElementById('countdownTimer').innerText = 'Countdown finished!';
                    return;
                }
                const seconds = Math.floor((timeRemaining / 1000) % 60);
                const minutes = Math.floor((timeRemaining / 1000 / 60) % 60);
                const hours = Math.floor((timeRemaining / (1000 * 60 * 60)) % 24);
                document.getElementById('countdownTimer').innerText = `Countdown: ${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }

        // Function to load prayer times from data.json
        async function loadPrayerTimes() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const tableBody = document.querySelector('#prayerTimes tbody');
                data.prayers.forEach(prayer => {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${prayer.name}</td><td>${prayer.time}</td>`;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading prayer times:', error);
            }
        }

        // Initialize the clock, countdown, and load prayer times
        updateClock();
        setInterval(updateClock, 1000);
        setupCountdown(new Date('2026-04-03T21:00:00Z')); // Example target date
        loadPrayerTimes();
    </script>
</body>
</html>
